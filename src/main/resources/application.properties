spring.application.name=Proyecto_Desarrollo3

# =========================
# SECURITY (KEYCLOAK)
# =========================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/viva-eventos}


# Puerto del backend
server.port=8081

# =========================
# BASE DE DATOS (H2)
# =========================
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update

# =========================
# H2 CONSOLE
# =========================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


# =========================
# KEYCLOAK AUTH (LOGIN)
# =========================
keycloak.token-url=${KEYCLOAK_TOKEN_URL:${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/viva-eventos}/protocol/openid-connect/token}
keycloak.client-id=backend-client
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET}